# VContainer - OCI container image builder distro
#
# Shares the same stripped DISTRO_FEATURES as vruntime (via vruntime-base.inc)
# but uses a lighter BBMASK that keeps OCI tooling available while still
# masking irrelevant recipes (graphics, multimedia, virtualization platforms,
# orchestration tools).
#
# Used by container-aarch64 / container-x86-64 multiconfigs to build
# single-arch OCI images that are then combined into multi-arch indexes.

require conf/distro/include/vruntime-base.inc

# Lighter BBMASK than vruntime: masks graphics, multimedia, desktop,
# virtualization platforms, and orchestration tools, but keeps OCI tooling
# (umoci, container-registry, image recipes) that vruntime blocks.
require conf/distro/include/vcontainer-bbmask.inc

DISTRO = "vcontainer"
DISTRO_NAME = "VContainer OCI Builder"
DISTRO_VERSION = "1.0"

# IMAGE_FSTYPES is NOT set here -- the 'oci' type requires image-oci.bbclass
# which only container image recipes inherit. Setting it distro-wide would
# break non-container images (e.g., core-image-*) parsed in this distro.
# Container recipes like container-base.bb set their own IMAGE_FSTYPES.
