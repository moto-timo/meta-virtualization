# Container host configuration fragment: LXC
#
# Include from local.conf to set up an LXC-based container host:
#
#   require conf/distro/include/meta-virt-host.conf
#   require conf/distro/include/container-host-lxc.conf
#   MACHINE = "qemux86-64"
#   bitbake container-image-host
#
# Sets CONTAINER_PROFILE for LXC. LXC is the user-space toolset for
# Linux Containers (the older, system-container-oriented sibling of
# OCI runtimes like runc/crun). It's also what incus uses underneath,
# but installs lxc-* command-line tools directly without an incus
# daemon in front of them.
#
# This profile pulls in:
#   - lxc                 — the lxc-create / lxc-start / etc. binaries
#   - lxc-networking      — lxc-net.service + lxcbr0 bridge config
#   - lxc-templates       — /usr/share/lxc/templates/ scripts
#
# (lxc-networking and lxc-templates land via the lxc recipe's RRECOMMENDS,
#  so they can be dropped through BAD_RECOMMENDATIONS if needed.)

CONTAINER_PROFILE = "lxc"
